version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    labels:
      - dependencies

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "ci"

    labels:
      - github-actions

